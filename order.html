<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>طلب المنتج</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      background-color: #f4f4f4;
      padding: 30px;
    }

    .order-form {
      background-color: white;
      max-width: 400px;
      margin: auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .order-form h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    .order-form input, .order-form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    .order-form button {
      background-color: #b8860b;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
    }

    .order-form button:hover {
      background-color: #a07308;
    }

    /* تنسيق مستطيل يحتوي على 4 أزرار */
    .input-container {
      background-color: #f9f9f9;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 15px;
      text-align: center;
    }

    .input-container button {
      padding: 12px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      background-color: #b8860b;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .input-container button:hover {
      background-color: #a07308;
      
    }


      /* بعض التنسيق لتوضيح مكان اسم المنتج */
      .product-name {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      margin-bottom: 20px;
      align-content: center;
    }
  </style>
</head>
<body>

  <div class="order-form">
    <h2>طلب المنتج</h2>


    
  <!-- عرض اسم المنتج في مكان بارز -->
  <div class="product-name" id="productNameDisplay">
    <!-- سيتم هنا عرض اسم المنتج -->
  </div>

    <form id="whatsappForm">
      <input type="text" id="name" placeholder="الاسم" required>
      <input type="tel" pattern="[0-9]{11}" id="phone" placeholder="رقم الهاتف" required>
      <input type="text" id="address" placeholder="العنوان" required>
      <label for="productName">اسم المنتج:</label>
      <input type="text" id="productInput" name="product" readonly>
      <textarea id="notes" placeholder="ملاحظات إضافية (اختياري)"></textarea>

      <!-- مستطيل يحتوي على 4 أزرار -->
      <div class="input-container">
        <button type="button" onclick="addButtonName('حجم 40مللي')">حجم 40مللي</button>
        <button type="button" onclick="addButtonName('حجم 50مللي')">حجم 50مللي</button>
        <button type="button" onclick="addButtonName('حجم 80مللي')">حجم 80مللي</button>
        <button type="button" onclick="addButtonName('حجم 100مللي')">حجم 100مللي</button>
      </div>

      <button type="submit">تأكيد الطلب عبر واتساب</button>
    </form>
  </div>

  <script>
    // تخزين اسم الزر الذي تم اختياره
    let selectedButtonName = "";

    // دالة لإضافة اسم الزر الذي تم اختياره
    function addButtonName(buttonName) {
      selectedButtonName = buttonName;
      alert("تم إضافة: " + buttonName); // عرض اسم الزر في نافذة منبثقة
    }

    // إرسال الطلب عبر واتساب
    document.getElementById("whatsappForm").addEventListener("submit", function(e) {
      e.preventDefault();

      var name = document.getElementById("name").value;
      var phone = document.getElementById("phone").value;
      var address = document.getElementById("address").value;
      var notes = document.getElementById("notes").value;
      var notes = document.getElementById("productInput").value;


      // دمج اسم الزر المختار مع النص المرسل
      var message = `مرحبًا، أود طلب هذا المنتج 👇\n\nالاسم: ${name}\nرقم الهاتف: ${phone}\nالعنوان: ${address}\nملاحظات: ${notes}\n\nتم اختيار: ${selectedButtonName}`;

      var whatsappNumber = "201065043283"; // رقمك على واتساب بصيغة دولية

      var url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank');
    });








      // بنجيب الباراميتر من اللينك
    const params = new URLSearchParams(window.location.search);
    const product = params.get("product");
    if (product) {
      document.getElementById("productInput").value = product;
    }

      





    // عند إرسال النموذج
    document.getElementById('orderForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const productName = document.getElementById('productName').value;
      const customerName = document.getElementById('customerName').value;
      const customerPhone = document.getElementById('customerPhone').value;

      const message = `طلب جديد:
    المنتج: ${productName}
    الاسم: ${customerName}
    رقم الهاتف: ${customerPhone}`;

      const encodedMessage = encodeURIComponent(message);
      const whatsappLink = `https://wa.me/2XXXXXXXXXXX?text=${encodedMessage}`; // ← غيّر الرقم هنا

      window.open(whatsappLink, '_blank');
    });
  </script>

</body>
</html>
