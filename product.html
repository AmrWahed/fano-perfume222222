<!DOCTYPE html>

<title>تفاصيل المنتج</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:white;
}

.container{
    max-width:1000px;
    margin:40px auto;
    background:#111;
    padding:20px;
    border-radius:18px;
    border:1px solid #222;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

img{
    width:100%;
    border-radius:15px;
    object-fit:contain;
    background:#000;
    height:400px;
}

h1{
    color:gold;
    margin:0;
}

.desc{
    margin-top:10px;
    color:#ccc;
    line-height:1.8;
}

.sizes button{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#222;
    color:white;
}

.sizes button.active{
    background:gold;
    color:black;
}

.price{
    font-size:22px;
    margin:15px 0;
    color:gold;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

#order{
    background:gold;
    color:black;
}

#whatsapp{
    background:#25D366;
    color:white;
}

a{
    color:gold;
    display:block;
    margin-top:15px;
    text-decoration:none;
}

@media(max-width:800px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>

</head>
