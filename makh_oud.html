<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عطور شرقية</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 150px;
      background-color: #333;
      color: white;
      z-index: 1000;
      text-align: center;
      overflow: hidden;
    }

    .header-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 42px;
      font-weight: bold;
      background-color: rgba(0, 0, 0, 0.4);
      padding: 10px 20px;
      border-radius: 10px;
    }

    main {
      padding-top: 170px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .products-section {
      width: 100%;
      max-width: 1200px;
      padding: 30px 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 30px;
      justify-content: center;
    }

    .product-card {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
    }

    .product-image {
      width: 175px;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .product-name {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
      cursor: pointer;
    }

    .product-button {
      background-color: #d87a0e;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .product-button:hover {
      background-color: #b66a09;
    }

    .tooltip {
      position: relative;
      display: inline-block;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      background-color: #f1c40f;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .tooltip .tooltiptext {
      visibility: hidden;
      width: 230px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 5px;
      padding: 10px;
      position: absolute;
      z-index: 1;
      bottom: 125%;
      left: 50%;
      margin-left: -115px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tooltip:hover .tooltiptext {
      visibility: visible;
      opacity: 1;
    }

    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      background-color: #4caf50;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      z-index: 1100;
    }

    .back-button:hover {
      background-color: #388e3c;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <header>
    <img src="head(o).png" alt="عطور شرقية" class="header-image" />
    <div class="header-text">هنا ستجد جميع العطور المخمريات الفاخرة</div>
  </header>

  <a href="index.html" class="back-button">رجوع</a>

  <main>

    <!-- القسم الأول -->

    <div>غير متوفر حاليا</div>


  </main>

</body>

</html>
